name: TypeScript Check, Lint & Test
on:
  push:
    paths:
      - '**.js'
      - '**.ts'
      - '**.tsx'
      - '**.module.css'
      - '**.gql'
jobs:
  build:
    name: tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'yarn'
      - run: yarn
      - run: yarn generate
      - run: yarn setup
        env:
          NEXT_PUBLIC_PLANNER_ORG_ID: atb
      - run: yarn check-all
