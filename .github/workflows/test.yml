name: Test
on: [push]
jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm
      - run: pnpm generate
      - run: pnpm setup
        env:
          NEXT_PUBLIC_PLANNER_ORG_ID: atb
      - run: pnpm test
